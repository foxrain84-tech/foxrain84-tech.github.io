<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>KIRA Prompt</title>
<style>
:root{--bg:#f4f4f5;--card:#fff;--text:#18181b;--muted:#71717a;--line:#e4e4e7;--btn:#111827;--btnText:#fff;--ok:#15803d;--warn:#b45309}
@media(prefers-color-scheme:dark){:root{--bg:#0f1012;--card:#191a1e;--text:#f4f4f5;--muted:#a1a1aa;--line:#2d2e34;--btn:#f4f4f5;--btnText:#18181b;--ok:#6ee7a0;--warn:#fbbf24}}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:24px 16px 48px}
main{width:min(100%,620px);margin:auto}.brand{font-size:.76rem;letter-spacing:.18em;color:var(--muted);margin:8px 2px 18px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:25px 20px 18px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
h1{font-size:1.8rem;margin:0 0 5px}.meta{color:var(--muted);font-size:.96rem;margin-bottom:22px}
.cut{border-top:1px solid var(--line);padding:19px 0 17px}.cut:first-child{border-top:0;padding-top:2px}
.cut-number{font-size:.78rem;font-weight:800;letter-spacing:.14em;color:var(--muted)}.cut-title{font-size:1.12rem;font-weight:720;margin:7px 0 15px;line-height:1.35}
.copy{width:100%;border:0;border-radius:13px;background:var(--btn);color:var(--btnText);padding:15px 16px;font-size:1rem;font-weight:750;cursor:pointer}.copy:active{transform:scale(.99)}
.status{min-height:21px;margin-top:8px;font-size:.88rem;color:var(--ok);text-align:center}.warning{color:var(--warn)}
.notice{font-size:.8rem;color:var(--muted);text-align:center;margin:16px 2px 0;line-height:1.5}
</style>
</head>
<body>
<main>
<div class="brand">KIRA PROMPT</div>
<div class="panel">
<h1 id="title">Prompt Copy</h1>
<div class="meta" id="meta">데이터를 불러오는 중...</div>
<div id="content"></div>
</div>
<div class="notice" id="notice"></div>
</main>
<script>
function cleanPath(){let p=location.pathname.replace(/\/+$/,'');return p||'/'}
function fallbackCopy(text){const a=document.createElement('textarea');a.value=text;a.setAttribute('readonly','');a.style.position='fixed';a.style.opacity='0';document.body.appendChild(a);a.select();a.setSelectionRange(0,a.value.length);const ok=document.execCommand('copy');document.body.removeChild(a);if(!ok)throw new Error('copy failed')}
async function copyText(text){if(navigator.clipboard&&window.isSecureContext)await navigator.clipboard.writeText(text);else fallbackCopy(text)}
function showError(message){document.getElementById('title').textContent='페이지를 찾을 수 없어요.';document.getElementById('meta').textContent=message;document.getElementById('content').innerHTML=''}
function render(page){
 const title=document.getElementById('title'),meta=document.getElementById('meta'),content=document.getElementById('content'),notice=document.getElementById('notice');
 document.title=`${page.model.toUpperCase()} ${page.date} SET ${String(page.set).padStart(2,'0')} Prompt Copy`;
 title.textContent=page.model.toUpperCase();meta.textContent=`${page.date.replace(/(\d{4})(\d{2})(\d{2})/,'$1.$2.$3')} · SET ${String(page.set).padStart(2,'0')}`;content.innerHTML='';
 page.cuts.forEach((cut,i)=>{
   const section=document.createElement('section');section.className='cut';
   section.innerHTML=`<div class="cut-number">CUT ${String(cut.cut).padStart(2,'0')}</div><div class="cut-title"></div><button class="copy" type="button">📋 Copy Prompt</button><div class="status" aria-live="polite"></div>`;
   section.querySelector('.cut-title').textContent=cut.title;
   const button=section.querySelector('.copy'),status=section.querySelector('.status');
   button.onclick=async()=>{button.disabled=true;try{await copyText(cut.prompt);status.className='status';status.textContent='✓ Prompt copied'}catch(e){status.className='status warning';status.textContent='복사에 실패했습니다.'}finally{setTimeout(()=>{status.textContent='';button.disabled=false},1800)}};
   content.appendChild(section);
 });
 notice.innerHTML='각 버튼은 해당 컷의 프롬프트만 복사합니다.<br>프롬프트 전문은 화면에 표시되지 않습니다.';
}
(async()=>{
 try{
   const res=await fetch('/prompts.json?v='+Date.now(),{cache:'no-store'});
   if(!res.ok)throw new Error('data');
   const pages=await res.json(),page=pages[cleanPath()];
   if(!page){showError('공개된 세트가 없거나 주소가 잘못되었습니다.');return}
   render(page);
 }catch(e){showError('프롬프트 데이터를 불러오지 못했습니다.')}
})();
</script>
</body>
</html>
