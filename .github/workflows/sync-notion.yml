name: Sync prompts from Notion

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: notion-prompt-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate prompts.json from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 scripts/sync_notion.py

      - name: Commit changes
        run: |
          if git diff --quiet -- prompts.json; then
            echo "No prompt changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add prompts.json
          git commit -m "Sync prompts from Notion"
          git push
